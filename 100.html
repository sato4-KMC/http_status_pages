<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 Continue</title>
  <style>
    :root { --deep: #0f766e; --soft: #ccfbf1; --bg: #ecfeff; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, var(--soft), #ffffff 58%);
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 22px;
    }
    main {
      width: min(620px, 100%);
      text-align: center;
      display: grid;
      justify-items: center;
      gap: 12px;
    }
    .granny {
      width: min(300px, 72vw);
      aspect-ratio: 360 / 540;
      object-fit: contain;
      filter: drop-shadow(0 18px 22px rgba(15, 23, 42, .14));
    }
    .label {
      color: var(--deep);
      background: var(--soft);
      border: 1px solid color-mix(in srgb, var(--deep) 24%, transparent);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      color: var(--deep);
      font-size: clamp(76px, 22vw, 132px);
      line-height: .82;
      letter-spacing: 0;
      font-weight: 950;
    }
    h2 {
      margin: 0;
      font-size: clamp(22px, 5vw, 34px);
      line-height: 1.12;
      letter-spacing: 0;
    }
    .summary, .granny-line {
      margin: 0;
      max-width: 44rem;
      color: #334155;
      font-size: clamp(15px, 3.5vw, 18px);
      font-weight: 750;
      line-height: 1.7;
    }
    .granny-line {
      color: var(--deep);
      background: color-mix(in srgb, var(--soft) 58%, white);
      border-left: 5px solid var(--deep);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    a {
      color: var(--deep);
      text-decoration: none;
      font-weight: 800;
    }
    .button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid color-mix(in srgb, var(--deep) 24%, transparent);
      background: rgba(255,255,255,.72);
      padding: 9px 14px;
    }
    @media (max-width: 520px) {
      body { padding: 16px; }
      main { gap: 11px; }
      .granny { width: min(240px, 76vw); }
      .actions { width: 100%; }
      .button { flex: 1 1 11rem; }
    }

  </style>
</head>
