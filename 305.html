  <title>305 Use Proxy</title>
  <style>
    :root { --deep: #2563eb; --soft: #dbeafe; --bg: #eff6ff; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, var(--soft), #ffffff 54%);
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 24px;
    }
    main {
      width: min(560px, 100%);
      text-align: center;
      display: grid;
      justify-items: center;
      gap: 14px;
    }
    .uncle {
      width: min(280px, 74vw);
      aspect-ratio: 320 / 260;
      object-fit: contain;
    }
    .label {
      color: var(--deep);
      background: var(--soft);
      border: 1px solid color-mix(in srgb, var(--deep) 24%, transparent);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      color: var(--deep);
      font-size: clamp(76px, 22vw, 132px);
      line-height: .82;
      letter-spacing: 0;
      font-weight: 950;
    }
    h2 {
      margin: 0;
      font-size: clamp(22px, 5vw, 34px);
      line-height: 1.12;
      letter-spacing: 0;
    }
    .apology {
      margin: 4px 0 0;
      max-width: 42rem;
      color: #334155;
      font-size: clamp(16px, 3.8vw, 20px);
      font-weight: 750;
      line-height: 1.75;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    a {
      color: var(--deep);
      text-decoration: none;
      font-weight: 800;
    }
    .button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid color-mix(in srgb, var(--deep) 24%, transparent);
      background: rgba(255,255,255,.72);
      padding: 9px 14px;
    }
    @media (max-width: 520px) {
      body { padding: 16px; }
      main { gap: 12px; }
      .uncle { width: min(230px, 78vw); }
      .actions { width: 100%; }
      .button { flex: 1 1 11rem; }
    }

  </style>
</head>
